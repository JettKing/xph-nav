.resource-desc{

<script>


function searchResources(){

const input =
document
.getElementById("searchInput")
.value
.toLowerCase()
.trim();


const cards =
document.querySelectorAll(
".resource-card"
);


let visibleCount = 0;


cards.forEach(card => {

const text =
card.innerText.toLowerCase();


if(text.includes(input)){

card.style.display = "block";

visibleCount++;

}else{

card.style.display = "none";

}

});


document.getElementById(
"resourceCount"
).textContent =
visibleCount + " 个资源";


document.getElementById(
"noResult"
).style.display =
visibleCount === 0
? "block"
: "none";

}



const categories =
document.querySelectorAll(
".category"
);


categories.forEach(category => {

category.addEventListener(
"click",
function(){

categories.forEach(item => {

item.classList.remove(
"active"
);

});


this.classList.add(
"active"
);


const selected =
this.textContent.trim();


const cards =
document.querySelectorAll(
".resource-card"
);


let visibleCount = 0;


cards.forEach(card => {

const tag =
card
.querySelector(".tag")
.textContent
.trim();


if(
selected === "全部" ||
tag === selected
){

card.style.display =
"block";

visibleCount++;

}else{

card.style.display =
"none";

}

});


document.getElementById(
"resourceCount"
).textContent =
visibleCount + " 个资源";


document.getElementById(
"noResult"
).style.display =
visibleCount === 0
? "block"
: "none";

}

);

});


/* =========================
   原生返回逻辑
   不创建新的历史记录
========================= */

const backButton = document.getElementById("backButton");

backButton.addEventListener("click", function(){

if(window.history.length > 1){

window.history.back();

}else{

window.location.replace("/");

}

});


</script>
