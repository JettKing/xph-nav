<body>
<div class="container">
<div class="header"><button class="back" id="backButton" type="button" aria-label="返回">‹</button><div class="header-title">优质网站</div></div>
<div class="hero"><p>精选值得收藏的优质网站，发现更多实用在线资源。</p></div>
<div class="search-box"><span class="search-icon">⌕</span><input type="text" id="searchInput" placeholder="搜索优质网站..."></div>
<div class="categories"><button class="category-btn active" data-category="all">全部</button><button class="category-btn" data-category="online">在线工具</button><button class="category-btn" data-category="learning">学习资源</button><button class="category-btn" data-category="design">设计素材</button><button class="category-btn" data-category="development">开发工具</button></div>
<div class="section-title"><h2>精选网站</h2><div class="count" id="count">5 个资源</div></div>
<div class="tools" id="tools"><!-- TinyWow -->
<div class="tool-card" data-category="online" data-name="TinyWow">
<div class="tool-main"><div class="tool-icon">🧰</div><div class="tool-info"><div class="tool-name">TinyWow</div><div class="tool-desc">提供大量免费在线文件处理工具</div></div></div>
<div class="tool-bottom"><div class="tool-tag">在线工具</div><div class="tool-actions"><a class="action-btn website-btn" href="https://tinywow.com/" target="_blank" rel="noopener noreferrer">官网地址</a><span class="action-btn disabled-btn">暂无项目</span></div></div>
</div>
<!-- freeCodeCamp -->
<div class="tool-card" data-category="learning" data-name="freeCodeCamp">
<div class="tool-main"><div class="tool-icon">💻</div><div class="tool-info"><div class="tool-name">freeCodeCamp</div><div class="tool-desc">免费的编程学习与开发者教育平台</div></div></div>
<div class="tool-bottom"><div class="tool-tag">学习资源</div><div class="tool-actions"><a class="action-btn website-btn" href="https://www.freecodecamp.org/" target="_blank" rel="noopener noreferrer">官网地址</a><span class="action-btn disabled-btn">暂无项目</span></div></div>
</div>
<!-- Unsplash -->

<div class="tool-main"><div class="tool-icon">🖼️</div><div class="tool-info"><div class="tool-name">Unsplash</div><div class="tool-desc">高质量免费图片与摄影素材网站</div></div></div>
<div class="tool-bottom"><div class="tool-tag">设计素材</div><div class="tool-actions"><a class="action-btn website-btn" href="https://unsplash.com/" target="_blank" rel="noopener noreferrer">官网地址</a><span class="action-btn disabled-btn">暂无项目</span></div></div>
</div>
<!-- GitHub -->

<div class="tool-main"><div class="tool-icon">🐙</div><div class="tool-info"><div class="tool-name">GitHub</div><div class="tool-desc">全球开发者代码托管与开源协作平台</div></div></div>

<!-- Remove.bg -->

<div class="tool-main"><div class="tool-icon">✂️</div><div class="tool-info"><div class="tool-name">Remove.bg</div><div class="tool-desc">快速自动去除图片背景的在线工具</div></div></div>

</div></div>

</div>
<script>
let currentCategory="all";
const searchInput=document.getElementById("searchInput");
const categoryButtons=document.querySelectorAll(".category-btn");
function filterTools(){
const keyword=searchInput.value.toLowerCase().trim();const cards=document.querySelectorAll(".tool-card");let visibleCount=0;
cards.forEach(function(card){const matchSearch=card.dataset.name.toLowerCase().includes(keyword);const matchCategory=currentCategory==="all"||card.dataset.category===currentCategory;if(matchSearch&&matchCategory){card.style.display="block";visibleCount++;}else{card.style.display="none";}});
document.getElementById("count").textContent=visibleCount+" 个资源";document.getElementById("empty").style.display=visibleCount===0?"block":"none";
}
searchInput.addEventListener("input",filterTools);
categoryButtons.forEach(function(button){button.addEventListener("click",function(){categoryButtons.forEach(function(item){item.classList.remove("active");});this.classList.add("active");currentCategory=this.dataset.category;filterTools();});});
const backButton=document.getElementById("backButton");if(backButton){backButton.addEventListener("click",function(){if(window.history.length>1){window.history.back();}else{window.location.replace("/");}});}
document.oncontextmenu=function(){return false;};
document.onkeydown=function(e){if(e.keyCode===123||(e.ctrlKey&&e.keyCode===85)||(e.ctrlKey&&e.shiftKey&&e.keyCode===73)){return false;}};
</script>
