<script>

const searchInput =
document.getElementById("searchInput");

const cards =
document.querySelectorAll(".card");

const categories =
document.querySelectorAll(".category");

const resourceCount =
document.getElementById("resourceCount");

const noResult =
document.getElementById("noResult");

let currentCategory =
"全部";


function filterResources(){

const keyword =
searchInput.value
.trim()
.toLowerCase();

let visibleCount =
0;


cards.forEach(card => {

const category =
card.dataset.category;

const searchText =
card.dataset.search
.toLowerCase();


const categoryMatch =

currentCategory === "全部" ||

category === currentCategory;


const searchMatch =

keyword === "" ||

searchText.includes(keyword);


if(
categoryMatch &&
searchMatch
){

card.style.display =
"block";

visibleCount++;

}else{

card.style.display =
"none";

}

});


resourceCount.textContent =
visibleCount + " 个资源";


if(
visibleCount === 0
){

noResult.style.display =
"block";

}else{

noResult.style.display =
"none";

}

}


searchInput.addEventListener(
"input",
filterResources
);


categories.forEach(button => {

button.addEventListener(
"click",
function(){

categories.forEach(item => {

item.classList.remove(
"active"
);

});


this.classList.add(
"active"
);


currentCategory =
this.dataset.category;


filterResources();

});

});


/* =========================
   原生返回逻辑
   不创建新的历史记录
========================= */

const backButton =
document.getElementById("backButton");

backButton.addEventListener(
"click",
function(){

if(window.history.length > 1){

window.history.back();

}else{

window.location.replace("/");

}

});

</script>
