<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>商务合作 - 徐胖虎资源社</title>

<meta name="description" content="徐胖虎资源社商务合作，提供频道推广、品牌合作、资源合作与长期合作方案。">

<meta name="robots" content="index,follow">

<link rel="canonical" href="https://xph.asia/resources/business.html">

<link rel="icon" href="/favicon.ico">

<link rel="apple-touch-icon" href="/favicon.ico">


<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

body{

margin:0;

background:#f5f5f7;

font-family:
-apple-system,
BlinkMacSystemFont,
"SF Pro Display",
"Helvetica Neue",
Arial,
sans-serif;

color:#1d1d1f;

}

.container{

max-width:430px;

margin:auto;

padding:
calc(24px + env(safe-area-inset-top))
20px
calc(35px + env(safe-area-inset-bottom));

}


/* =========================
   顶部导航
========================= */

.topbar{

height:72px;

display:flex;

align-items:center;

justify-content:center;

position:relative;

}

.back-btn{

position:absolute;

left:0;

width:56px;

height:56px;

border-radius:50%;

background:#fff;

display:flex;

align-items:center;

justify-content:center;

text-decoration:none;

color:#111;

font-size:34px;

font-weight:300;

border:0;

padding:0;

cursor:pointer;

font-family:inherit;

box-shadow:0 10px 30px rgba(0,0,0,.06);

}

.top-title{

font-size:20px;

font-weight:700;

}


/* =========================
   页面介绍
========================= */

.hero{

padding-top:38px;

padding-bottom:42px;

}

.hero h1{

margin:0;

font-size:40px;

line-height:1.15;

letter-spacing:-1.5px;

font-weight:800;

}

.hero p{

margin:24px 0 0;

font-size:15px;

line-height:1.7;

color:#8e8e93;

white-space:nowrap;

}


/* =========================
   标题区域
========================= */

.section-head{

display:flex;

align-items:center;

justify-content:space-between;

margin-bottom:18px;

}

.section-title{

font-size:26px;

font-weight:800;

}

.section-count{

font-size:15px;

color:#aaa;

}


/* =========================
   合作卡片
========================= */

.cooperation-list{

display:flex;

flex-direction:column;

gap:16px;

}

.cooperation-card{

background:#fff;

border-radius:26px;

padding:20px;

box-shadow:0 10px 30px rgba(0,0,0,.045);

}

.card-main{

display:flex;

align-items:center;

}

.card-icon{

width:60px;

height:60px;

border-radius:18px;

background:#f3f6ff;

display:flex;

align-items:center;

justify-content:center;

font-size:29px;

flex-shrink:0;

}

.card-info{

margin-left:16px;

min-width:0;

}

.card-name{

font-size:20px;

font-weight:700;

line-height:1.3;

}

.card-desc{

margin-top:8px;

font-size:14px;

line-height:1.5;

color:#8e8e93;

white-space:nowrap;

}

.card-bottom{

display:flex;

align-items:center;

justify-content:space-between;

margin-top:18px;

}

.card-tag{

padding:9px 14px;

border-radius:14px;

background:#f5f5f7;

font-size:13px;

color:#8e8e93;

}

.consult-btn{

min-width:72px;

height:42px;

padding:0 18px;

border-radius:15px;

background:#3478f6;

display:flex;

align-items:center;

justify-content:center;

color:#fff;

font-size:14px;

font-weight:500;

text-decoration:none;

}


/* =========================
   合作说明
========================= */

.notice{

background:#fff;

border-radius:26px;

padding:24px;

margin-top:24px;

box-shadow:0 10px 30px rgba(0,0,0,.045);

}

.notice-title{

font-size:21px;

font-weight:700;

margin-bottom:20px;

}

.notice-item{

display:flex;

align-items:flex-start;

font-size:14px;

line-height:1.7;

color:#666;

margin-top:12px;

}

.notice-item:first-of-type{

margin-top:0;

}

.dot{

width:6px;

height:6px;

border-radius:50%;

background:#3478f6;

margin-right:12px;

margin-top:9px;

flex-shrink:0;

}


/* =========================
   底部联系按钮
========================= */

.contact-btn{

height:64px;

display:flex;

align-items:center;

justify-content:center;

margin-top:24px;

border-radius:20px;

background:#229ed9;

color:#fff;

font-size:17px;

font-weight:600;

text-decoration:none;

box-shadow:0 12px 30px rgba(34,158,217,.15);

}


/* =========================
   底部版权
========================= */

.footer{

text-align:center;

font-size:13px;

color:#aaa;

margin-top:36px;

padding-bottom:10px;

}


/* =========================
   小屏幕适配
========================= */

@media(max-width:380px){

.hero h1{

font-size:36px;

}

.hero p{

font-size:14px;

}

.card-desc{

font-size:13px;

}

.card-icon{

width:56px;

height:56px;

}

.card-info{

margin-left:13px;

}

}

</style>

</head>

<script>

/* =========================
   原生返回逻辑
   不创建新的历史记录
========================= */

const backButton = document.getElementById("backButton");

backButton.addEventListener("click", function(){

if(window.history.length > 1){

window.history.back();

}else{

window.location.replace("/");

}

});
