<script>

const backButton = document.getElementById("backButton");

const params = new URLSearchParams(
window.location.search

const type = params.get("type");

const from = params.get("from");


/*

返回商务合作页面
*/

const businessTypes = [

"channel",

"brand",

"resource",

"longterm",

"business"

];


if(

from === "business" ||

businessTypes.includes(type)

){

backButton.href =

"/resources/business.html";

}


/*
从商城进入
返回数字商城
*/

else if(from === "shop"){

backButton.href =

"/shop/";

}


/*
从会员专区进入
返回会员专区
*/

else if(from === "member"){

backButton.href =

"/member/";

}


/*

else{
