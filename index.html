<script>


function toggleBox(id){

const box = document.getElementById(id);

if(box){

box.classList.toggle("open");

}

}



function updateTime(){

const d = new Date();

const m = String(d.getMonth()+1).padStart(2,"0");

const day = String(d.getDate()).padStart(2,"0");

const h = String(d.getHours()).padStart(2,"0");

const min = String(d.getMinutes()).padStart(2,"0");

const s = String(d.getSeconds()).padStart(2,"0");


document.getElementById("time").textContent =

"时间 "+m+"-"+day+" "+h+":"+min+":"+s;

}


updateTime();

setInterval(updateTime,1000);



const viewsElement = document.getElementById("views");

const lastVisit = Number(
localStorage.getItem("xph_last_visit") || 0
);

const now = Date.now();

const thirtyMinutes = 30 * 60 * 1000;

const shouldCount =

!lastVisit ||

now - lastVisit > thirtyMinutes;


const statsUrl = shouldCount

? "https://xph-stats.huaaplus.workers.dev"

: "https://xph-stats.huaaplus.workers.dev?read=1";


fetch(statsUrl)

.then(response => {

if(!response.ok){

throw new Error("HTTP "+response.status);

}

return response.json();

})

.then(data => {

const count =

data.visits ??

data.total ??

data.views ??

0;


viewsElement.textContent = count;


if(shouldCount){

localStorage.setItem(

"xph_last_visit",

String(now)

);

}

})

.catch(error => {

console.error(

"访问量读取失败：",

error

);

viewsElement.textContent = "0";

});



const ua = navigator.userAgent.toLowerCase();

const clash = document.getElementById("clashDownload");


if(

ua.includes("iphone") ||

ua.includes("ipad")

){

clash.href =

"https://apps.apple.com/us/app/clash-mi/id6744321968";

}else{

clash.href =

"https://clashmi.app/download";

}



document.oncontextmenu = function(){

return false;

};


document.onkeydown = function(e){

if(

e.keyCode === 123 ||

(e.ctrlKey && e.keyCode === 85) ||

(e.ctrlKey && e.shiftKey && e.keyCode === 73)

){

return false;

}

};
