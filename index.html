<script>


// 时间

function updateTime(){

let d=new Date();

let m=String(d.getMonth()+1).padStart(2,"0");
let day=String(d.getDate()).padStart(2,"0");

let h=String(d.getHours()).padStart(2,"0");
let min=String(d.getMinutes()).padStart(2,"0");
let s=String(d.getSeconds()).padStart(2,"0");


document.getElementById("time").innerHTML=
"时间 "+m+"-"+day+" "+h+":"+min+":"+s;

}


setInterval(updateTime,1000);

updateTime();




// 浏览统计

let views=localStorage.getItem("views")||2026;

views++;

localStorage.setItem("views",views);

document.getElementById("views").innerHTML=views;





// 自动检测设备

let ua=navigator.userAgent.toLowerCase();

let device=document.getElementById("device");

let clash=document.getElementById("clashDownload");


if(
ua.includes("iphone")||
ua.includes("ipad")
){

device.innerHTML="已检测到苹果设备";

clash.href=
"https://apps.apple.com/us/app/clash-mi/id6744321968";

}


else if(
ua.includes("android")
){

device.innerHTML="已检测到安卓设备";

clash.href=
"https://clashmi.app/download";

}


else{

device.innerHTML="已检测到电脑设备";

clash.href=
"https://clashmi.app/download";

}





// 禁止查看源码

document.oncontextmenu=function(){
return false;
};


document.onkeydown=function(e){

if(
e.keyCode===123 ||
(e.ctrlKey&&e.keyCode===85) ||
(e.ctrlKey&&e.shiftKey&&e.keyCode===73)
){

return false;

}

};
